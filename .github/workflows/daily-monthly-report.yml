name: Daily SSDP Monthly Report

on:
  schedule:
    # Daily check for updated weekly pages and republish monthly if needed.
    - cron: "15 06 * * *"
  workflow_dispatch:
      inputs:
        target_month:
          description: "Month as YYYY-MM (empty = calendar month in MONTHLY_REPORT_TZ, see job env)"
          required: false
          type: string
          default: ""

jobs:
  run-daily-monthly:
    runs-on: ubuntu-latest
    env:
      MONTHLY_REPORT_TZ: ${{ vars.MONTHLY_REPORT_TZ }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Publish current month (only if changed)
        shell: bash
        run: |
          set -euo pipefail
          TZ_FOR_MONTH="${MONTHLY_REPORT_TZ:-Europe/Paris}"
          INPUT_MONTH="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target_month || '' }}"
          if [ -n "${INPUT_MONTH// }" ]; then
            MONTH="${INPUT_MONTH// }"
          else
            MONTH="$(TZ="${TZ_FOR_MONTH}" date +%Y-%m)"
          fi
          echo "Publishing monthly report for ${MONTH} (calendar month in TZ=${TZ_FOR_MONTH}; override via repo var MONTHLY_REPORT_TZ or workflow_dispatch target_month)"

          python3 monthly_report.py --month "${MONTH}" --publish --skip-if-unchanged
        env:
          CONFLUENCE_USERNAME: ${{ secrets.CONFLUENCE_USERNAME }}
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          CONFLUENCE_SPACE_KEY: ${{ secrets.CONFLUENCE_SPACE_KEY }}
          CONFLUENCE_PARENT_PAGE_ID: ${{ secrets.CONFLUENCE_PARENT_PAGE_ID }}
          # Prefer publishing under the monthly container if provided.
          MONTHLY_PARENT_PAGE_ID: ${{ secrets.MONTHLY_PARENT_PAGE_ID }}
